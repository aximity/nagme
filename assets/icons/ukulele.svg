<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Small headstock -->
  <rect x="44" y="22" width="12" height="8" rx="3" stroke="currentColor" stroke-width="2"/>
  <!-- Tuning pegs (4, 2 per side) -->
  <line x1="42" y1="25" x2="44" y2="25" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="28" x2="44" y2="28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="25" x2="58" y2="25" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="28" x2="58" y2="28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- Short neck (key: MUCH shorter than guitar) -->
  <path d="M48 30V44M52 30V44" stroke="currentColor" stroke-width="2"/>
  <!-- Round/pear body (NO waist, single round shape, WIDE relative to height) -->
  <ellipse cx="50" cy="64" rx="18" ry="22" stroke="currentColor" stroke-width="2"/>
  <!-- Sound hole (small) -->
  <circle cx="50" cy="60" r="5" stroke="currentColor" stroke-width="1.5"/>
  <!-- Decorative rosette -->
  <circle cx="50" cy="60" r="7" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
  <!-- Bridge -->
  <path d="M44 76H56" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
</svg>
