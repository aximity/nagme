<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Headstock -->
  <path d="M43 8H55V18H43V8Z" stroke="currentColor" stroke-width="2"/>
  <!-- Tuning machines -->
  <circle cx="40" cy="10.5" r="1.5" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="40" cy="15" r="1.5" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="58" cy="10.5" r="1.5" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="58" cy="15" r="1.5" stroke="currentColor" stroke-width="1.5"/>
  <!-- Long neck -->
  <path d="M47 18V46M53 18V46" stroke="currentColor" stroke-width="2"/>
  <!-- Fret dots -->
  <circle cx="50" cy="28" r="0.8" fill="currentColor"/>
  <circle cx="50" cy="38" r="0.8" fill="currentColor"/>
  <!-- LEFT HORN (tall, P-Bass upper horn) -->
  <line x1="38" y1="46" x2="36" y2="38" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- RIGHT HORN (short cutaway) -->
  <line x1="60" y1="46" x2="62" y2="42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- BODY: wide, flat-bottomed, angular -->
  <path d="M38 46 L32 50 L32 72 L36 80 L44 84 L56 84 L64 80 L68 72 L68 50 L60 46" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <!-- Connect neck to body -->
  <line x1="47" y1="46" x2="38" y2="46" stroke="currentColor" stroke-width="2"/>
  <line x1="53" y1="46" x2="60" y2="46" stroke="currentColor" stroke-width="2"/>
  <!-- Split-coil pickup (offset - P-Bass signature) -->
  <rect x="37" y="58" width="12" height="3.5" rx="0.5" stroke="currentColor" stroke-width="1.5"/>
  <rect x="49" y="61" width="12" height="3.5" rx="0.5" stroke="currentColor" stroke-width="1.5"/>
  <!-- Knobs (right side, near edge) -->
  <circle cx="62" cy="72" r="2" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="62" cy="77" r="1.5" stroke="currentColor" stroke-width="1.5"/>
</svg>
