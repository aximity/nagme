<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Scroll -->
  <path d="M50 8C48 8 47 9 47 11C47 13 49 14 50 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
