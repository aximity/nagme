  <path d="M47.5 13V20H52.5V13" stroke="currentColor" stroke-width="2" fill="none"/>
  <!-- Pegs -->
  <line x1="45.5" y1="15" x2="47.5" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="52.5" y1="17" x2="54.5" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- Neck -->
  <path d="M49 20V37M51 20V37" stroke="currentColor" stroke-width="2"/>
  <!-- Upper bout (WIDER than violin - squared shoulders) -->
  <path d="M46 37Q36 40 35 48" stroke="currentColor" stroke-width="2" fill="none"/>
  <path d="M54 37Q64 40 65 48" stroke="currentColor" stroke-width="2" fill="none"/>
  <!-- C-bout (wider waist) -->
  <path d="M35 48Q40 51 41 54" stroke="currentColor" stroke-width="2" fill="none"/>
  <path d="M65 48Q60 51 59 54" stroke="currentColor" stroke-width="2" fill="none"/>
  <!-- Lower bout (wider) -->
  <path d="M41 54Q34 58 35 69Q36 78 44 82" stroke="currentColor" stroke-width="2" fill="none"/>
  <path d="M59 54Q66 58 65 69Q64 78 56 82" stroke="currentColor" stroke-width="2" fill="none"/>
  <!-- Bottom -->
  <path d="M44 82Q50 84 56 82" stroke="currentColor" stroke-width="2" fill="none"/>
  <!-- F-holes (slightly longer) -->
  <path d="M42 52Q41 58 43 65" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M58 52Q59 58 57 65" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Bridge -->
  <line x1="43" y1="61" x2="57" y2="61" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tailpiece -->
  <path d="M47 71L50 80L53 71" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Chin rest -->
  <path d="M43 79Q39 81 39 85" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
