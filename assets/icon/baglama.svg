<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Burguluk (straight pegbox) -->
  <path d="M48 6H52V16H48V6Z" stroke="currentColor" stroke-width="2"/>
  <!-- Burgular (pegs - 3 groups) -->
  <path d="M46 8H44M46 11H44M46 14H44M54 8H56M54 11H56M54 14H56" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- VERY LONG thin neck (signature) -->
  <path d="M49 16V58M51 16V58" stroke="currentColor" stroke-width="2"/>
  <!-- Perde bağları (fret ties - SIGNATURE of bağlama) -->
  <line x1="48" y1="21" x2="52" y2="21" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="48" y1="26" x2="52" y2="26" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="48" y1="30" x2="52" y2="30" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="48" y1="34" x2="52" y2="34" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="48" y1="38" x2="52" y2="38" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="48" y1="42" x2="52" y2="42" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="48" y1="46" x2="52" y2="46" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="48" y1="50" x2="52" y2="50" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Tekne (pear/teardrop bowl - wider at bottom, narrow at neck join) -->
  <path d="M49 58Q40 60 36 68Q33 76 36 82Q40 90 50 92Q60 90 64 82Q67 76 64 68Q60 60 51 58" stroke="currentColor" stroke-width="2" fill="none"/>
  <!-- Small off-center sound hole -->
  <ellipse cx="46" cy="76" rx="3.5" ry="2.5" stroke="currentColor" stroke-width="1.5" transform="rotate(-10 46 76)"/>
</svg>
