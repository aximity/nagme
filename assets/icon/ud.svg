<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Angled-back pegbox (ud signature) -->
  <path d="M47 18L53 22V35L47 31V18Z" stroke="currentColor" stroke-width="2"/>
  <!-- Tuning pegs (6, 3 per side for 11 strings) -->
  <path d="M45 20H43M45 24H43M45 28H43M55 22H57M55 26H57M55 30H57" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- Short neck, NO frets (ud is fretless) -->
  <path d="M49 31V48M51 35V48" stroke="currentColor" stroke-width="2"/>
  <!-- Large pear body -->
  <path d="M50 48C40 48 34 56 34 66C34 78 41 86 50 86C59 86 66 78 66 66C66 56 60 48 50 48Z" stroke="currentColor" stroke-width="2"/>
  <!-- Triple rosette (3 small sound holes in triangle - ud signature) -->
  <circle cx="44" cy="68" r="3.5" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="56" cy="68" r="3.5" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="50" cy="76" r="3.5" stroke="currentColor" stroke-width="1.5"/>
  <!-- Bridge -->
  <path d="M44 82H56" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
</svg>
