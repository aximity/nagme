<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#161311]/80 backdrop-blur-xl border-b border-[#504535]/15 shadow-[0_40px_40px_rgba(0,0,0,0.06)] flex items-center justify-between px-6 h-16 w-full">
<button class="active:scale-95 transition-transform duration-500 ease-in-out hover:bg-[#383432]/50 p-2 rounded-full">
<span class="material-symbols-outlined text-[#e8a838]">arrow_back</span>
</button>
<h1 class="font-headline font-extrabold tracking-tight text-2xl text-[#e8a838]">Nağme</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="pt-24 pb-12 px-8 flex flex-col items-center text-center max-w-[390px] mx-auto min-h-screen">
<!-- 1. Heart Icon & Gradient Line -->
<div class="mb-8 flex flex-col items-center">
<div class="relative mb-4">
<span class="material-symbols-outlined text-[48px] text-[#e8a838] text-glow" style="font-variation-settings: 'FILL' 1;">favorite</span>
<div class="absolute inset-0 bg-[#e8a838] opacity-20 blur-xl rounded-full"></div>
</div>
<div class="w-10 h-[2px] amber-gradient-line"></div>
</div>
<!-- 2. Main Title -->
<h2 class="font-headline font-bold text-2xl leading-snug text-on-surface mb-6">
            Bu uygulama, Mehmet Akif Yıldız'ın anısına geliştirilmiştir.
        </h2>
<!-- 3. Thin Separator -->
<div class="w-8 h-[2px] bg-[#e8a838]/30 mb-6"></div>
<!-- 4. Secondary Text -->
<p class="font-body font-light italic text-base text-[#8a8078] leading-relaxed mb-10">
            Nağme, sadece bir akort aracı değil; onun ruhuna bırakılmış küçük bir hayrattır.
        </p>
<!-- 5. Nostalgic Photo Area -->
<div class="relative w-full aspect-[4/5] mb-12 group">
<div class="absolute inset-0 bg-[#1e1b19] rounded-xl overflow-hidden shadow-[0_40px_40px_rgba(0,0,0,0.25)]">
<img alt="Memorial Portrait" class="w-full h-full object-cover grayscale opacity-80" data-alt="vibrant oil painting style of a man with a gentle smile, warm amber lighting, blurred background of a library, nostalgic and reverent atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD7mOcW6Td3vTBZw3QM8I5fmRYecBDVajKUwJCEdtv-Z8WxelXbO_pYjeXOtE-T-xx1rDWlZV9VBj_kbl5KBQwBQPhRZUIKZ5dURYMorQRp5h_9-2XpqpJTXzMlGkOOJExegVwrno1ozZ8-FXoznq7Hmn1ovUyO06ahOgOGIGHUde7B4AJGD3HpqCHCzrjFtXWXmTosQQd1U2mrmEcyq6LrDuF_VMSxJqcojas5rjjHxyzrwTGValQdRVfI3ugNS1uhrkgc9iwZcIKP"/>
</div>
<!-- Asymmetric Overlay Card -->
<div class="absolute -bottom-6 -right-4 bg-surface-container/90 backdrop-blur-md p-5 rounded-lg shadow-xl max-w-[80%] border-t border-[#504535]/20">
<p class="font-body italic text-sm text-primary leading-tight text-right">
                    "Her tınıda bir hatıra, her nağmede bir dua..."
                </p>
</div>
</div>
<!-- 6. Info Block (3 Columns) -->
<div class="grid grid-cols-3 gap-4 w-full pt-6 border-t border-[#504535]/15 mb-12">
<div class="flex flex-col gap-1 items-start">
<span class="font-label text-[10px] tracking-wider text-[#e8a838]/60 uppercase">Geliştirici</span>
<span class="font-body text-xs font-medium text-[#8a8078]">Ahmet</span>
</div>
<div class="flex flex-col gap-1 items-center">
<span class="font-label text-[10px] tracking-wider text-[#e8a838]/60 uppercase">Durum</span>
<span class="font-body text-xs font-medium text-[#8a8078]">Tamamen Ücretsiz</span>
</div>
<div class="flex flex-col gap-1 items-end">
<span class="font-label text-[10px] tracking-wider text-[#e8a838]/60 uppercase">Kullanım</span>
<span class="font-body text-xs font-medium text-[#8a8078] text-right">Reklamsız / Çevrimdışı</span>
</div>
</div>
<!-- 7. Footer -->
<footer class="mt-auto pt-8">
<span class="material-symbols-outlined text-xl text-[#e8a838]/60" style="font-variation-settings: 'FILL' 1;">favorite</span>
