name: nagme
description: "Nağme — Profesyonel kromatik tuner ve enstrüman akort uygulaması."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  flutter_audio_capture: ^1.1.7
  shared_preferences: ^2.3.3
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#111125"
  adaptive_icon_foreground: "assets/icon/app_icon_adaptive_fg.png"
  web:
    generate: false

flutter_native_splash:
  color: "#111125"
  image: "assets/splash/splash_logo.png"
  android_12:
    color: "#111125"
    image: "assets/splash/splash_logo.png"
    icon_background_color: "#111125"
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/
